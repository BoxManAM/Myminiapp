<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Cookie Clicker Mini App</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Telegram WebApp script (will be loaded inside Telegram) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="user-info">
          <div class="avatar" id="avatar"></div>
          <div class="user-text">
            <div class="username" id="username">Гость</div>
            <div class="subtitle">Печенечный кликер</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat">
            <span class="label">Монеты</span>
            <span class="value" id="coins">0</span>
          </div>
          <div class="stat">
            <span class="label">За клик</span>
            <span class="value" id="perClick">1</span>
          </div>
        </div>
      </header>

      <main class="main">
        <button id="cookieButton" class="cookie-button">
          <div class="cookie"></div>
          <span class="cookie-text">Кликни печенье!</span>
        </button>

        <section class="upgrade-card">
          <div class="upgrade-info">
            <h2>Усилить клик</h2>
            <p>
              Увеличивает количество монет за один клик.
            </p>
          </div>
          <div class="upgrade-details">
            <div class="cost">
              Стоимость: <span id="upgradeCost">10</span> монет
            </div>
            <button id="upgradeButton" class="upgrade-button">
              Прокачать
            </button>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="main.js"></script>
  </body>
  </html>
